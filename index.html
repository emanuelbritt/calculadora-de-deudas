<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculadora de Deudas</title>
<meta name="theme-color" content="#8C3E00">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="Deudas">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --org:    #C05A00;
  --org-dk: #8C3E00;
  --org-lt: #E87318;
  --yel:    #F5C842;
  --yel-lt: #FDE98A;
  --blue:   #3A50C8;
  --blue-dk:#2A3A96;
  --paper:  #FFF8F0;
  --bg:     #F5EDE0;
  --line:   #E8D5BC;
  --ink:    #2A1A06;
  --muted:  #8A6A48;
  --good:   #1E7A4E;
  --danger: #B53A2A;
  --paid:   #E6F4ED;
  --tab-h:  44px;
}
body{font-family:'Avenir Next','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:60px}
input,select{max-width:100%;min-width:0;font-family:inherit}
input:focus,button:focus{outline:2px solid var(--org-lt);outline-offset:1px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

/* ── TOP BAR ── */
.topbar{background:linear-gradient(135deg,var(--org-dk) 0%,var(--org) 60%,var(--org-lt) 100%);color:#fff;padding:calc(.85rem + env(safe-area-inset-top)) 1.1rem .7rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem}
.topbar-text .eyebrow{font-size:.65rem;letter-spacing:.18em;color:var(--yel-lt);font-weight:700;margin-bottom:.18rem;text-transform:uppercase}
.topbar-text h1{font-size:1.1rem;font-weight:800;line-height:1.2;color:#fff}
.sync-wrap{display:flex;align-items:center;gap:.35rem;flex-shrink:0}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--yel);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#4cde84}
.sync-dot.err{background:#FF6B5B}
.sync-dot.saving{background:var(--yel);animation:pulse .7s infinite alternate}
.sync-label{font-size:.67rem;color:rgba(255,255,255,.8);font-weight:600}
@keyframes pulse{from{opacity:1}to{opacity:.3}}

/* ── CARD TABS ── */
.tab-bar{display:flex;align-items:flex-end;overflow-x:auto;background:var(--org-dk);padding:0 .6rem;gap:.25rem;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:.35rem;height:var(--tab-h);padding:0 .85rem;background:rgba(255,255,255,.12);color:rgba(255,255,255,.65);border-radius:10px 10px 0 0;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;border:none;transition:background .15s,color .15s;flex-shrink:0;font-family:inherit}
.tab:hover{background:rgba(255,255,255,.22);color:#fff}
.tab.active{background:var(--paper);color:var(--org-dk)}
.tab .del-btn{display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:transparent;border:none;color:inherit;cursor:pointer;font-size:.68rem;opacity:.5;padding:0;line-height:1}
.tab .del-btn:hover{background:rgba(181,58,42,.2);opacity:1}
.add-tab-btn{height:var(--tab-h);padding:0 .9rem;background:transparent;border:none;color:rgba(255,255,255,.65);font-size:1.3rem;cursor:pointer;border-radius:10px 10px 0 0;flex-shrink:0;line-height:1;font-family:inherit}
.add-tab-btn:hover{background:rgba(255,255,255,.15);color:#fff}

/* ── PANELS ── */
.panel{display:none;max-width:520px;margin:0 auto}
.panel.active{display:block}

/* ── SUB TABS ── */
.sub-bar{display:flex;background:var(--paper);border-bottom:2px solid var(--line);position:sticky;top:0;z-index:10}
.sub-btn{flex:1;padding:.58rem .5rem;border:none;background:transparent;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;font-family:inherit}
.sub-btn:hover{color:var(--org)}
.sub-btn.active{color:var(--org-dk);border-bottom-color:var(--yel)}
.sub-section{display:none;padding:.9rem .9rem 2rem}
.sub-section.active{display:block}

/* ── CARDS ── */
.card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:.85rem;box-shadow:0 2px 8px rgba(192,90,0,.08)}
.card-head{background:linear-gradient(90deg,#FFF3E0,#FFF8F0);border-bottom:1px solid var(--line);padding:.52rem .9rem;font-size:.68rem;font-weight:800;color:var(--org);text-transform:uppercase;letter-spacing:.07em}
.card-body{padding:.8rem .9rem .95rem}

/* ── INPUTS ── */
.name-field{display:flex;align-items:center;gap:.5rem;padding:.6rem .9rem;border-bottom:1px solid var(--line)}
.name-field label{font-size:.72rem;color:var(--muted);font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.name-field input{flex:1;border:none;background:transparent;font-size:.9rem;font-weight:800;color:var(--org-dk);padding:.1rem .2rem;font-family:inherit}
.name-field input:focus{outline:none;border-bottom:2px solid var(--org-lt)}
.desc-display{padding:.48rem .9rem .55rem;border-bottom:1px solid var(--line);font-size:.76rem;color:var(--muted);font-style:italic;min-height:1.9rem}
.desc-display span{color:var(--ink);font-style:normal;font-weight:600}

.tasa-row{display:flex;align-items:center;gap:.55rem;padding:.58rem .9rem;flex-wrap:wrap}
.tasa-row label{font-size:.78rem;font-weight:700;color:var(--org-dk);white-space:nowrap}
.tasa-row input{width:78px;padding:.22rem .4rem;border:1.5px solid var(--line);border-radius:8px;font-size:.88rem;font-weight:800;color:var(--org);font-family:'Courier New',monospace;text-align:right;background:var(--paper)}
.tasa-row input:focus{outline:2px solid var(--org-lt);border-color:transparent}
.tasa-row .hint{font-size:.68rem;color:var(--muted)}

/* ── TOGGLES ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:.52rem .9rem;border-bottom:1px solid var(--line);gap:.6rem}
.toggle-row:last-child{border-bottom:none}
.toggle-left{display:flex;flex-direction:column;gap:.08rem}
.toggle-label{font-size:.8rem;font-weight:700;color:var(--ink)}
.toggle-sub{font-size:.68rem;color:var(--muted)}
.pill{position:relative;width:40px;height:22px;flex-shrink:0}
.pill input{opacity:0;width:0;height:0;position:absolute}
.pill-track{position:absolute;inset:0;background:var(--line);border-radius:99px;cursor:pointer;transition:background .2s}
.pill input:checked+.pill-track{background:var(--org-lt)}
.pill-track::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.pill input:checked+.pill-track::after{transform:translateX(18px)}
.extra-amount{display:flex;align-items:center;gap:.25rem;padding:.38rem .9rem .5rem 2.4rem;background:#FFF8F0;border-bottom:1px solid var(--line)}
.extra-amount.hidden{display:none}
.extra-amount label{font-size:.72rem;color:var(--org-dk);font-weight:700;white-space:nowrap}
.extra-amount .pfx{font-size:.8rem;color:var(--org);font-weight:800}
.extra-amount input{width:110px;padding:.22rem .4rem;border:1.5px solid var(--line);border-radius:7px;font-size:.88rem;font-weight:700;color:var(--org);font-family:'Courier New',monospace;text-align:right;background:#fff}
.extra-amount input:focus{outline:2px solid var(--org-lt);border-color:transparent}
.extra-amount .hint{font-size:.66rem;color:var(--muted)}

/* ── SUMMARY ── */
.summary-grid{display:grid;grid-template-columns:1fr auto;gap:0}
.sum-row{display:contents}
.sum-row>span:first-child{font-size:.8rem;color:var(--muted);padding:.28rem 0;border-bottom:1px solid var(--line);display:flex;align-items:center}
.sum-row>span:last-child{font-family:'Courier New',monospace;font-size:.88rem;font-weight:700;text-align:right;padding:.28rem 0;border-bottom:1px solid var(--line)}
.sum-row.big>span:first-child{font-size:.86rem;font-weight:800;color:var(--org-dk);border-bottom:none;padding-top:.48rem}
.sum-row.big>span:last-child{font-size:1.05rem;color:var(--org-dk);border-bottom:none;padding-top:.48rem}
.sum-row.hi>span:last-child{color:var(--org)}
.sum-row.cap>span:last-child{color:var(--good)}
.sum-row.int>span:last-child{color:var(--danger)}

/* ── PROGRESS ── */
.progress-banner{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:.85rem;box-shadow:0 2px 8px rgba(192,90,0,.08)}
.progress-inner{padding:.72rem .9rem .8rem}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.42rem}
.prog-top .pl{font-size:.76rem;font-weight:800;color:var(--org-dk)}
.prog-top .pp{font-size:.82rem;font-weight:800;color:var(--good)}
.prog-bar-bg{height:10px;background:var(--line);border-radius:99px;overflow:hidden}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--good),#3DDC84);border-radius:99px;transition:width .4s}
.prog-amounts{display:flex;justify-content:space-between;align-items:center;margin-top:.38rem;font-size:.7rem;color:var(--muted);gap:.3rem}
.pa-paid{color:var(--good);font-weight:800;font-family:'Courier New',monospace}
.pa-total{font-family:'Courier New',monospace;font-weight:700}
.prog-pending{text-align:center;margin-top:.38rem;padding:.3rem .6rem;background:rgba(181,58,42,.07);border-radius:8px;font-size:.78rem;color:var(--danger);font-weight:800}
.prog-pending span{font-family:'Courier New',monospace}
.prog-done{text-align:center;margin-top:.38rem;padding:.3rem .6rem;background:rgba(30,122,78,.1);border-radius:8px;font-size:.78rem;color:var(--good);font-weight:800}

/* ── PLAN TABLE ── */
.table-wrap{border-radius:10px;border:1px solid var(--line);overflow:hidden}
.plan-table{width:100%;border-collapse:collapse;font-size:.76rem}
.plan-mes-header td{background:linear-gradient(90deg,var(--org-dk),var(--org));color:#fff;font-weight:800;font-size:.73rem;padding:.42rem .75rem;letter-spacing:.02em}
.plan-mes-header td:last-child{text-align:right;font-family:'Courier New',monospace}
.plan-item-row td{padding:.3rem .75rem .3rem 1.2rem;border-bottom:1px solid var(--line);font-size:.74rem}
.plan-item-row td:first-child{color:var(--ink)}
.plan-item-row td:last-child{text-align:right;font-family:'Courier New',monospace}
.plan-item-int{font-size:.64rem;color:var(--danger)}
.plan-total-row td{padding:.36rem .75rem;font-weight:800;font-size:.78rem;border-bottom:3px solid var(--line);background:#FFF3E0}
.plan-total-row td:last-child{text-align:right;font-family:'Courier New',monospace;color:var(--org-dk)}
.plan-extras-row td{padding:.26rem .75rem .26rem 1.2rem;border-bottom:1px solid var(--line);font-size:.71rem;color:var(--muted)}
.plan-extras-row td:last-child{text-align:right;font-family:'Courier New',monospace}
.plan-mes-paid .plan-mes-header td{background:linear-gradient(90deg,var(--good),#2E9E62)}
.plan-mes-paid .plan-item-row td,.plan-mes-paid .plan-total-row td,.plan-mes-paid .plan-extras-row td{background:var(--paid)}
.plan-mes-paid .plan-total-row td:last-child{color:var(--good)}
.paid-cb{width:17px;height:17px;accent-color:var(--good);cursor:pointer;vertical-align:middle}

/* ── PURCHASE CARDS ── */
.purchase-card{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:.6rem;overflow:hidden;box-shadow:0 1px 5px rgba(192,90,0,.06)}
.purchase-header{display:flex;align-items:center;justify-content:space-between;padding:.45rem .75rem;background:#FFF3E0;border-bottom:1px solid var(--line);gap:.5rem}
.purchase-header input[type="text"]{flex:1;border:none;background:transparent;font-size:.82rem;font-weight:800;color:var(--org-dk);padding:0;min-width:0;font-family:inherit}
.purchase-header input[type="text"]:focus{outline:none;border-bottom:1.5px solid var(--org-lt)}
.purchase-del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:1rem;padding:0 .2rem;opacity:.45;flex-shrink:0}
.purchase-del:hover{opacity:1}
.purchase-body{padding:.52rem .75rem .58rem;display:grid;grid-template-columns:1fr 1fr;gap:.38rem .6rem}
.pf{display:flex;flex-direction:column;gap:.16rem}
.pf label{font-size:.63rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.pf-row{display:flex;align-items:center;gap:.16rem}
.pf-row .pfx{font-size:.78rem;color:var(--org);font-weight:800}
.pf input[type="number"]{width:100%;padding:.26rem .36rem;border:1.5px solid var(--line);border-radius:8px;font-size:.84rem;font-weight:700;color:var(--ink);font-family:'Courier New',monospace;background:var(--paper)}
.pf input[type="number"]:focus{outline:2px solid var(--org-lt);border-color:transparent}
.int-toggle{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding-top:.36rem;border-top:1px dashed var(--line);margin-top:.05rem;gap:.5rem}
.int-toggle .it-label{font-size:.75rem;font-weight:800;color:var(--ink)}
.int-toggle .it-sub{font-size:.64rem;color:var(--muted)}
.p-preview{grid-column:1/-1;font-size:.68rem;color:var(--muted);padding-top:.05rem}
.p-preview strong{color:var(--org)}
.p-preview strong.free{color:var(--good)}
.add-purchase-btn{width:100%;padding:.6rem;border:2px dashed var(--line);border-radius:10px;background:transparent;color:var(--org);font-size:.8rem;font-weight:800;cursor:pointer;margin-bottom:.5rem;transition:background .15s,border-color .15s;font-family:inherit}
.add-purchase-btn:hover{background:#FFF3E0;border-color:var(--org-lt)}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--org-dk),var(--org));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:999;transition:opacity .4s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.25);border-top-color:var(--yel);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{color:#fff;font-size:.9rem;opacity:.85;font-weight:600}

.note{font-size:.67rem;color:var(--muted);line-height:1.5}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <p>Cargando deudas...</p>
</div>

<div class="topbar">
  <div class="topbar-text">
    <div class="eyebrow">Mis finanzas</div>
    <h1>Calculadora de Deudas</h1>
  </div>
  <div class="sync-wrap">
    <div class="sync-dot" id="syncDot"></div>
    <span class="sync-label" id="syncLabel">Conectando...</span>
  </div>
</div>

<div class="tab-bar" id="tabBar">
  <button class="add-tab-btn" id="addTabBtn">＋</button>
</div>
<div id="panels"></div>

<script>
/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function cop(n){return '$'+Math.round(n).toLocaleString('es-CO')}
function pct(n){return n.toFixed(4)+'%'}
function monthlyRate(ea){return Math.pow(1+ea/100,1/12)-1}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function setSync(state, label){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  dot.className='sync-dot '+(state||'');
  if(lbl && label) lbl.textContent=label;
}

/* ══════════════════════════════════════════
   MATH
══════════════════════════════════════════ */
function amortizePurchase(monto,cuotas,ea,conInteres){
  if(!conInteres){
    const cf=monto/cuotas;
    return Array.from({length:cuotas},(_,i)=>({cuotaActual:cf,interes:0,capital:cf,saldo:Math.max(0,monto-cf*(i+1))}));
  }
  const im=monthlyRate(ea);
  const cuota=im===0?monto/cuotas:monto*(im*Math.pow(1+im,cuotas))/(Math.pow(1+im,cuotas)-1);
  let saldo=monto,rows=[];
  for(let i=0;i<cuotas;i++){
    const interes=saldo*im;
    const capital=i===cuotas-1?saldo:cuota-interes;
    saldo=i===cuotas-1?0:saldo-capital;
    rows.push({cuotaActual:capital+interes,interes,capital,saldo:Math.max(0,saldo)});
  }
  return rows;
}
function consolidate(d){
  if(!d.purchases||!d.purchases.length)return{maxMes:0,plans:[],monthTotals:[]};
  const maxMes=Math.max(...d.purchases.map(p=>p.cuotas));
  const plans=d.purchases.map(p=>amortizePurchase(p.monto,p.cuotas,d.ea,p.conInteres));
  const extras=(d.tieneCuotaManejo?d.cuotaManejo:0)+(d.tieneSeguro?d.seguro:0);
  const monthTotals=[];
  for(let m=0;m<maxMes;m++){
    let total=0,interes=0;
    d.purchases.forEach((p,i)=>{if(m<p.cuotas){total+=plans[i][m].cuotaActual;interes+=plans[i][m].interes;}});
    monthTotals.push({total,interes,extras,totalConExtras:total+extras});
  }
  return{maxMes,plans,monthTotals};
}

/* ══════════════════════════════════════════
   STATE  — carga local primero
══════════════════════════════════════════ */
const LS_KEY='calc-deudas-state';
let estado={deudas:[],activaId:null,updatedAt:0};
let _savingLocally=false;

function cargarLocal(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){const parsed=JSON.parse(raw);if(parsed&&Array.isArray(parsed.deudas))estado=parsed;}
  }catch(e){}
  if(!estado.deudas.length){
    const demo=createDebt('Mi tarjeta');
    estado.deudas.push(demo);
    estado.activaId=demo.id;
  }
  if(!estado.activaId&&estado.deudas.length)estado.activaId=estado.deudas[0].id;
}
function guardarLocal(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(estado));}catch(e){}
}

/* guardar — se reemplaza con versión Firebase más abajo */
let guardar=()=>{ estado.updatedAt=Date.now(); guardarLocal(); };

/* ══════════════════════════════════════════
   DATA HELPERS
══════════════════════════════════════════ */
function createDebt(name){
  return{id:uid(),name:name||'Nueva tarjeta',ea:28.14,
    tieneCuotaManejo:false,cuotaManejo:0,tieneSeguro:false,seguro:0,
    purchases:[],paidMonths:{}};
}
function createPurchase(desc,monto,cuotas,conInteres){
  return{id:uid(),desc:desc||'Compra',monto:monto||100000,cuotas:cuotas||1,conInteres:!!conInteres};
}
function debtById(id){return estado.deudas.find(d=>d.id===id)}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function renderTabs(){
  const bar=document.getElementById('tabBar'),addBtn=document.getElementById('addTabBtn');
  bar.querySelectorAll('.tab').forEach(t=>t.remove());
  estado.deudas.forEach(d=>{
    const btn=document.createElement('button');
    btn.className='tab'+(d.id===estado.activaId?' active':'');
    const sp=document.createElement('span');sp.textContent=d.name||'Tarjeta';btn.appendChild(sp);
    if(estado.deudas.length>1){
      const del=document.createElement('button');del.className='del-btn';del.innerHTML='✕';
      del.onclick=e=>{e.stopPropagation();removeDebt(d.id)};btn.appendChild(del);
    }
    btn.addEventListener('click',()=>switchTab(d.id));
    bar.insertBefore(btn,addBtn);
  });
}
function switchTab(id){
  estado.activaId=id;renderTabs();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const t=document.getElementById('panel-'+id);if(t)t.classList.add('active');
}
function removeDebt(id){
  const idx=estado.deudas.findIndex(d=>d.id===id);
  estado.deudas=estado.deudas.filter(d=>d.id!==id);
  if(estado.activaId===id)estado.activaId=estado.deudas[Math.max(0,idx-1)]?.id||estado.deudas[0]?.id;
  guardar();renderTabs();rebuildAll();
}

/* ── progress ── */
function updateProgress(d){
  const inner=document.getElementById('progress-inner-'+d.id);
  if(!inner)return;
  const{maxMes,monthTotals}=consolidate(d);
  if(!maxMes){inner.innerHTML='';return;}
  const totalPagar=monthTotals.reduce((s,m)=>s+m.totalConExtras,0);
  let pagado=0;
  for(let m=0;m<maxMes;m++){if(d.paidMonths&&d.paidMonths[String(m)])pagado+=monthTotals[m].totalConExtras;}
  const pendiente=totalPagar-pagado;
  const p=totalPagar>0?Math.round(pagado/totalPagar*100):0;
  const done=p>=100;
  inner.innerHTML=`
    <div class="prog-top"><span class="pl">${done?'🎉 ¡Pagado!':'Pagado hasta ahora'}</span><span class="pp">${p}%</span></div>
    <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${p}%"></div></div>
    <div class="prog-amounts">
      <span><span class="pa-paid">${cop(pagado)}</span> pagado</span>
      <span style="opacity:.4">·</span>
      <span>total <span class="pa-total">${cop(totalPagar)}</span></span>
    </div>
    ${done?`<div class="prog-done">✅ ¡Deuda saldada!</div>`:`<div class="prog-pending">Aún debes <span>${cop(pendiente)}</span></div>`}`;
}

/* ── plan rows ── */
function buildPlanRows(d,plans,monthTotals,maxMes){
  const extras=(d.tieneCuotaManejo?d.cuotaManejo:0)+(d.tieneSeguro?d.seguro:0);
  let html='';
  for(let m=0;m<maxMes;m++){
    const mt=monthTotals[m];
    const paid=!!(d.paidMonths&&d.paidMonths[String(m)]);
    const activeItems=d.purchases.map((p,i)=>({p,r:plans[i][m],active:m<p.cuotas})).filter(x=>x.active);
    const itemRows=activeItems.map(({p,r})=>`<tr class="plan-item-row"><td>${escH(p.desc)}</td><td>${cop(r.cuotaActual)}${r.interes>0?`<br><span class="plan-item-int">int: ${cop(r.interes)}</span>`:''}</td></tr>`).join('');
    const extrasRow=extras>0?`<tr class="plan-extras-row"><td>Cuota manejo / seguro</td><td>${cop(extras)}</td></tr>`:'';
    html+=`<tbody class="${paid?'plan-mes-paid':''}">
      <tr class="plan-mes-header"><td>Mes ${m+1}</td><td><input type="checkbox" class="paid-cb" data-debt="${d.id}" data-mi="${m}" ${paid?'checked':''}></td></tr>
      ${itemRows}${extrasRow}
      <tr class="plan-total-row"><td>Total mes ${m+1}</td><td>${cop(mt.totalConExtras)}</td></tr>
    </tbody>`;
  }
  return html;
}

/* ── build panel ── */
function buildPanel(d,activeSub){
  activeSub=activeSub||'resumen';
  const im=monthlyRate(d.ea);
  const{maxMes,plans,monthTotals}=consolidate(d);
  const autoDesc=(d.purchases||[]).map(p=>p.desc).filter(Boolean).join(', ');
  const totalCapital=(d.purchases||[]).reduce((s,p)=>s+p.monto,0);
  const totalInteres=monthTotals.reduce((s,m)=>s+m.interes,0);
  const totalExtrasAll=monthTotals.reduce((s,m)=>s+m.extras,0);
  const totalPagar=totalCapital+totalInteres+totalExtrasAll;

  const resumenHtml=`
    <div class="card">
      <div class="name-field"><label>Tarjeta / Deuda</label>
        <input type="text" value="${escH(d.name)}" placeholder="Ej: BBVA Aqua Gold" data-debt="${d.id}" data-field="name">
      </div>
      ${autoDesc?`<div class="desc-display">🛒 <span>${escH(autoDesc)}</span></div>`:`<div class="desc-display">Agrega compras en la pestaña <strong>🛒 Compras</strong></div>`}
      <div class="tasa-row">
        <label>Tasa E.A.</label>
        <input type="number" value="${d.ea}" min="0.01" max="80" step="0.01" data-debt="${d.id}" data-field="ea" inputmode="decimal">
        <span style="font-size:.72rem;color:var(--muted)">%</span>
        <span class="hint">· mensual: <strong>${pct(im*100)}</strong></span>
      </div>
    </div>
    <div class="card">
      <div class="card-head">Cobros adicionales mensuales</div>
      <div class="toggle-row">
        <div class="toggle-left"><span class="toggle-label">Cuota de manejo</span><span class="toggle-sub">${d.tieneCuotaManejo?cop(d.cuotaManejo)+' / mes':'No aplica'}</span></div>
        <label class="pill"><input type="checkbox" data-debt="${d.id}" data-field="tieneCuotaManejo" ${d.tieneCuotaManejo?'checked':''}><span class="pill-track"></span></label>
      </div>
      <div class="extra-amount${d.tieneCuotaManejo?'':' hidden'}">
        <label>Valor mensual</label><span class="pfx">$</span>
        <input type="number" value="${d.cuotaManejo}" min="0" step="100" data-debt="${d.id}" data-field="cuotaManejo" inputmode="numeric">
        <span class="hint">sin IVA</span>
      </div>
      <div class="toggle-row">
        <div class="toggle-left"><span class="toggle-label">Seguro</span><span class="toggle-sub">${d.tieneSeguro?cop(d.seguro)+' / mes':'No tiene'}</span></div>
        <label class="pill"><input type="checkbox" data-debt="${d.id}" data-field="tieneSeguro" ${d.tieneSeguro?'checked':''}><span class="pill-track"></span></label>
      </div>
      <div class="extra-amount${d.tieneSeguro?'':' hidden'}">
        <label>Valor mensual</label><span class="pfx">$</span>
        <input type="number" value="${d.seguro}" min="0" step="100" data-debt="${d.id}" data-field="seguro" inputmode="numeric">
        <span class="hint">ver extracto</span>
      </div>
    </div>
    ${maxMes>0?`
    <div class="card">
      <div class="card-head">Resumen total</div>
      <div class="card-body">
        <div class="summary-grid">
          ${d.purchases.map(p=>`<div class="sum-row cap"><span>${escH(p.desc)} (${p.cuotas} cuota${p.cuotas>1?'s':''})</span><span>${cop(p.monto)}</span></div>`).join('')}
          <div class="sum-row hi" style="border-top:1px solid var(--line);margin-top:.12rem"><span><strong>Capital total</strong></span><span>${cop(totalCapital)}</span></div>
          <div class="sum-row int"><span>Total intereses</span><span>${cop(totalInteres)}</span></div>
          ${totalExtrasAll>0?`<div class="sum-row int"><span>Cobros adicionales (${maxMes} m)</span><span>${cop(totalExtrasAll)}</span></div>`:''}
          <div class="sum-row big"><span>Total a pagar</span><span>${cop(totalPagar)}</span></div>
        </div>
      </div>
    </div>
    <div class="progress-banner" id="progress-banner-${d.id}">
      <div class="card-head">Progreso de pago</div>
      <div class="progress-inner" id="progress-inner-${d.id}"></div>
    </div>
    <div class="card">
      <div class="card-head">Plan de pagos mes a mes</div>
      <div class="table-wrap"><table class="plan-table">${buildPlanRows(d,plans,monthTotals,maxMes)}</table></div>
      <p class="note" style="padding:.45rem .9rem">Marca ✓ los meses ya pagados.</p>
    </div>`:''}`;

  const purchaseCards=(d.purchases||[]).map(p=>{
    const rows=amortizePurchase(p.monto,p.cuotas,d.ea,p.conInteres);
    const cuotaPreview=rows[0]?.cuotaActual||0;
    return`<div class="purchase-card">
      <div class="purchase-header">
        <input type="text" value="${escH(p.desc)}" placeholder="Nombre de la compra" data-debt="${d.id}" data-pid="${p.id}" data-pf="desc">
        <button class="purchase-del" data-debt="${d.id}" data-pid="${p.id}">✕</button>
      </div>
      <div class="purchase-body">
        <div class="pf"><label>Monto</label>
          <div class="pf-row"><span class="pfx">$</span><input type="number" value="${p.monto}" min="1000" step="1000" data-debt="${d.id}" data-pid="${p.id}" data-pf="monto" inputmode="numeric"></div>
        </div>
        <div class="pf"><label>Cuotas</label>
          <div class="pf-row"><input type="number" value="${p.cuotas}" min="1" max="60" step="1" style="width:65px" data-debt="${d.id}" data-pid="${p.id}" data-pf="cuotas" inputmode="numeric"><span style="font-size:.7rem;color:var(--muted);margin-left:.2rem">meses</span></div>
        </div>
        <div class="int-toggle">
          <div><div class="it-label">¿Cobra interés?</div><div class="it-sub">${p.conInteres?'Sí · sistema francés':'No · cuotas iguales'}</div></div>
          <label class="pill"><input type="checkbox" data-debt="${d.id}" data-pid="${p.id}" data-pf="conInteres" ${p.conInteres?'checked':''}><span class="pill-track"></span></label>
        </div>
        <div class="p-preview">Cuota mes 1: <strong class="${p.conInteres?'':'free'}">${cop(cuotaPreview)}</strong> ${p.conInteres?'c/interés':'sin interés'} · ${p.cuotas} ${p.cuotas===1?'pago':'pagos'}</div>
      </div>
    </div>`;
  }).join('');

  const comprasHtml=`
    <div id="purchase-list-${d.id}">${purchaseCards}</div>
    <button class="add-purchase-btn" data-debt="${d.id}" data-action="addpurchase">＋ Agregar compra</button>
    <p class="note">Los cambios se guardan automáticamente.</p>`;

  const panel=document.createElement('div');
  panel.className='panel'+(d.id===estado.activaId?' active':'');
  panel.id='panel-'+d.id;
  panel.innerHTML=`
    <div class="sub-bar">
      <button class="sub-btn${activeSub==='resumen'?' active':''}" data-sub="resumen">📊 Resumen</button>
      <button class="sub-btn${activeSub==='compras'?' active':''}" data-sub="compras">🛒 Compras (${(d.purchases||[]).length})</button>
    </div>
    <div class="sub-section${activeSub==='resumen'?' active':''}" data-sub="resumen">${resumenHtml}</div>
    <div class="sub-section${activeSub==='compras'?' active':''}" data-sub="compras">${comprasHtml}</div>`;
  return panel;
}

/* ── rebuild ── */
function rebuildAll(){
  const container=document.getElementById('panels');
  const activeSubs={};
  estado.deudas.forEach(d=>{
    const el=document.querySelector(`#panel-${d.id} .sub-btn.active`);
    activeSubs[d.id]=el?el.dataset.sub:'resumen';
  });
  container.innerHTML='';
  estado.deudas.forEach(d=>{
    container.appendChild(buildPanel(d,activeSubs[d.id]||'resumen'));
    attachListeners(d);updateProgress(d);
  });
}
function rebuildDebt(d,keepSub){
  const old=document.getElementById('panel-'+d.id);
  const wasActive=old?.classList.contains('active');
  const activeSub=keepSub||old?.querySelector('.sub-btn.active')?.dataset.sub||'resumen';
  const newPanel=buildPanel(d,activeSub);
  if(wasActive)newPanel.classList.add('active');
  if(old)old.replaceWith(newPanel);else document.getElementById('panels').appendChild(newPanel);
  attachListeners(d);updateProgress(d);
}

/* ── listeners ── */
function attachListeners(d){
  const panel=document.getElementById('panel-'+d.id);
  if(!panel)return;

  panel.querySelectorAll('.sub-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const sub=e.currentTarget.dataset.sub;
      panel.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.dataset.sub===sub));
      panel.querySelectorAll('.sub-section').forEach(s=>s.classList.toggle('active',s.dataset.sub===sub));
    });
  });

  panel.querySelectorAll('.paid-cb').forEach(el=>{
    el.addEventListener('change',e=>{
      e.stopPropagation();
      if(!d.paidMonths)d.paidMonths={};
      d.paidMonths[String(e.target.dataset.mi)]=e.target.checked;
      const tbody=e.target.closest('tbody');
      if(tbody)tbody.className=e.target.checked?'plan-mes-paid':'';
      updateProgress(d);guardar();
    });
  });

  panel.querySelectorAll('input[type="checkbox"][data-field]').forEach(el=>{
    el.addEventListener('change',e=>{d[e.target.dataset.field]=e.target.checked;guardar();rebuildDebt(d);});
  });
  panel.querySelectorAll('input[type="checkbox"][data-pf="conInteres"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const p=d.purchases.find(x=>x.id===e.target.dataset.pid);
      if(p){p.conInteres=e.target.checked;guardar();rebuildDebt(d,'compras');}
    });
  });
  panel.querySelectorAll('input[type="text"][data-field="name"]').forEach(el=>{
    el.addEventListener('change',e=>{d.name=e.target.value||'Tarjeta';guardar();renderTabs();});
  });
  panel.querySelectorAll('input[type="text"][data-pf="desc"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const p=d.purchases.find(x=>x.id===e.target.dataset.pid);
      if(p){p.desc=e.target.value||'Compra';guardar();rebuildDebt(d,'compras');}
    });
  });
  panel.querySelectorAll('input[type="number"][data-field]').forEach(el=>{
    el.addEventListener('change',e=>{
      const field=e.target.dataset.field;
      let val=parseFloat(e.target.value);if(isNaN(val))return;
      if(field==='ea')val=Math.max(0.01,Math.min(80,val));
      if(field==='cuotaManejo'||field==='seguro')val=Math.max(0,val);
      d[field]=val;e.target.value=field==='ea'?val.toFixed(2):val;
      guardar();rebuildDebt(d);
    });
  });
  panel.querySelectorAll('input[type="number"][data-pf]').forEach(el=>{
    el.addEventListener('change',e=>{
      const p=d.purchases.find(x=>x.id===e.target.dataset.pid);if(!p)return;
      const pf=e.target.dataset.pf;
      let val=parseFloat(e.target.value);if(isNaN(val))return;
      if(pf==='monto')val=Math.max(1000,val);
      if(pf==='cuotas')val=Math.max(1,Math.min(60,Math.round(val)));
      p[pf]=val;e.target.value=val;guardar();rebuildDebt(d,'compras');
    });
  });
  panel.querySelectorAll('[data-action="addpurchase"]').forEach(el=>{
    el.addEventListener('click',e=>{
      const debt=debtById(e.target.dataset.debt);if(!debt)return;
      if(!debt.purchases)debt.purchases=[];
      debt.purchases.push(createPurchase('Compra '+(debt.purchases.length+1),100000,1,false));
      guardar();rebuildDebt(debt,'compras');
      setTimeout(()=>{
        const inputs=document.querySelectorAll(`#purchase-list-${debt.id} input[type="text"]`);
        const last=inputs[inputs.length-1];if(last){last.focus();last.select();}
      },40);
    });
  });
  panel.querySelectorAll('.purchase-del').forEach(el=>{
    el.addEventListener('click',e=>{
      const debt=debtById(e.target.dataset.debt);const pid=e.target.dataset.pid;
      if(debt){debt.purchases=debt.purchases.filter(p=>p.id!==pid);guardar();rebuildDebt(debt,'compras');}
    });
  });
}

/* ── add debt ── */
document.getElementById('addTabBtn').addEventListener('click',()=>{
  const d=createDebt('Nueva tarjeta');
  estado.deudas.push(d);estado.activaId=d.id;
  guardar();renderTabs();rebuildAll();
  setTimeout(()=>{const inp=document.querySelector(`#panel-${d.id} input[data-field="name"]`);if(inp){inp.focus();inp.select();}},40);
});

/* ══════════════════════════════════════════
   ARRANQUE — local primero, siempre funciona

cargarLocal();
renderTabs();
rebuildAll();
document.getElementById('loadingOverlay').classList.add('hidden');

  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

   FIREBASE — aparte, a prueba de fallos
   Si falla, la app sigue funcionando local.
══════════════════════════════════════════ */
const firebaseConfig={
  apiKey:"AIzaSyAUz7sVQ9GxyPM-RtjOF9jyuFAKIjeRbMI",
  authDomain:"calculadora-tarjetas.firebaseapp.com",
  projectId:"calculadora-tarjetas",
  storageBucket:"calculadora-tarjetas.firebasestorage.app",
  messagingSenderId:"435214406315",
  appId:"1:435214406315:web:cbd08a1ae32954c49f1dee"
};

(async function iniciarFirebase(){
  let refDoc,fbSetDoc,fbGetDoc,fbOnSnapshot;
  try{
    const appMod=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fsMod=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app=appMod.initializeApp(firebaseConfig);
    // persistentLocalCache: funciona offline y sincroniza al volver la señal
    const db=fsMod.initializeFirestore(app,{localCache:fsMod.persistentLocalCache()});
    refDoc=fsMod.doc(db,'deudas','estado');
    fbSetDoc=fsMod.setDoc; fbGetDoc=fsMod.getDoc; fbOnSnapshot=fsMod.onSnapshot;
  }catch(e){
    console.warn('Firebase no cargó:',e);
    setSync('err','Solo local');return;
  }

  /* reemplazar guardar con versión Firebase + debounce */
  let timer=null;
  guardar=()=>{
    estado.updatedAt=Date.now();
    guardarLocal();
    setSync('saving','Guardando...');
    clearTimeout(timer);
    timer=setTimeout(async()=>{
      _savingLocally=true;
      try{
        await fbSetDoc(refDoc,JSON.parse(JSON.stringify(estado)));
        setSync('ok','En línea ✓');
      }catch(e){
        setSync('err','Sin conexión');
      }
      setTimeout(()=>{_savingLocally=false;},600);
    },800);
  };

  /* carga inicial: comparar timestamps */
  try{
    const snap=await fbGetDoc(refDoc);
    if(snap.exists()){
      const remoto=snap.data();
      if((remoto.updatedAt||0)>(estado.updatedAt||0)){
        aplicarRemoto(remoto);
      } else {
        await fbSetDoc(refDoc,JSON.parse(JSON.stringify(estado)));
      }
    } else {
      await fbSetDoc(refDoc,JSON.parse(JSON.stringify(estado)));
    }
    setSync('ok','En línea ✓');
  }catch(e){
    setSync('err','Sin conexión — datos locales');
  }

  /* listener en tiempo real — se activa cuando otro dispositivo guarda */
  fbOnSnapshot(refDoc,snap=>{
    if(!snap.exists()||snap.metadata.hasPendingWrites||_savingLocally)return;
    const remoto=snap.data();
    if((remoto.updatedAt||0)>(estado.updatedAt||0)){
      aplicarRemoto(remoto);
      setSync('ok','En línea ✓');
    }
  },()=>setSync('err','Sin conexión'));
})();

function aplicarRemoto(remoto){
  if(!Array.isArray(remoto.deudas)||!remoto.deudas.length)return;
  const idActiva=estado.activaId;
  const activeSubs={};
  estado.deudas.forEach(d=>{
    const el=document.querySelector(`#panel-${d.id} .sub-btn.active`);
    activeSubs[d.id]=el?el.dataset.sub:'resumen';
  });
  estado=remoto;
  estado.activaId=estado.deudas.find(p=>p.id===idActiva)?idActiva:estado.deudas[0].id;
  guardarLocal();
  renderTabs();
  const container=document.getElementById('panels');
  container.innerHTML='';
  estado.deudas.forEach(d=>{
    container.appendChild(buildPanel(d,activeSubs[d.id]||'resumen'));
    attachListeners(d);updateProgress(d);
  });
}
